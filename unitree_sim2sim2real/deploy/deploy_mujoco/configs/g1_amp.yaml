# Unitree G1 29DoF AMP MuJoCo deployment config.
# Arrays under policy_joint_names follow IsaacLab AMP policy order; actuator_joint_names follows MuJoCo XML actuator order.

policy_path: "{LEGGED_LAB_ROOT_DIR}/logs/rsl_rl/g1_amp/2026-05-20_23-50-16_baseline_3000_accad50hz_rsi_20260520/exported/policy.pt"
robot_asset: s3_g1_29dof
xml_path: "{LEGGED_LAB_ROOT_DIR}/source/legged_lab/legged_lab/data/Robots/Unitree/s3_g1_29dof/g1_29dof.xml"

simulation_duration: 20.0
simulation_dt: 0.002
control_decimation: 10
use_glfw: true
real_time: true
add_floor: true
ensure_lighting: true
repair_missing_meshes: true
drop_missing_mesh_geoms: true
apply_joint_passive_params: true
joint_damping: 0.05
joint_armature: 0.01
joint_frictionloss: 0.2
wrist_frictionloss: 0.1
mesh_file_remaps:
  waist_yaw_link.STL: waist_yaw_link_rev_1_0.STL
  waist_roll_link.STL: waist_roll_link_rev_1_0.STL
  torso_link.STL: torso_link_rev_1_0.STL
floor_size: [20.0, 20.0, 0.05]
floor_rgba: [0.25, 0.25, 0.25, 1.0]
floor_friction: [1.0, 0.005, 0.0001]
healthy_min_root_height: 0.45
healthy_max_roll_pitch: 1.0
metrics_path: ""
torso_body_name: torso_link
# Optional ArmHack Stand deployment adapter. The dedicated launcher supplies
# absolute paths and keeps this disabled for every generic locomotion run.
armhack_stand_enable: false
armhack_stand_csv_path: ""
armhack_stand_manifest_path: ""
armhack_stand_checkpoint_path: ""
armhack_stand_report_path: ""
armhack_stand_test_id: all
armhack_stand_payload_kg: 0.0
# Optional ArmHack Walk adapter.  The dedicated launcher supplies absolute
# tracked data paths and keeps this disabled for generic locomotion/Stand runs.
armhack_walk_enable: false
armhack_walk_pose_path: ""
armhack_walk_contract_path: ""
armhack_walk_pose_name: pos2_down
armhack_walk_fixed_command: [0.35, 0.0, 0.0]
armhack_walk_start_active: true
# Optional full-body Stand recovery perturbation.  It randomizes state and
# applies wrenches only; unlike ArmHack it never overwrites policy actions.
extreme_stand_recovery_enable: false
extreme_stand_recovery_seed: 20260719
extreme_stand_recovery_leg_noise_rad: 0.20
extreme_stand_recovery_waist_noise_rad: 0.25
extreme_stand_recovery_arm_noise_rad: 0.45
extreme_stand_recovery_joint_velocity_noise_rad_s: 0.75
extreme_stand_recovery_root_roll_pitch_noise_rad: 0.18
extreme_stand_recovery_root_linear_velocity_noise_m_s: 0.30
extreme_stand_recovery_root_angular_velocity_noise_rad_s: 0.50
extreme_stand_recovery_force_max_n: 35.0
extreme_stand_recovery_torque_max_nm: 5.0
extreme_stand_recovery_wrench_interval_s: 2.5
extreme_stand_recovery_wrench_duration_s: 0.25
torso_trace_enable: true
torso_trace_path: ""
torso_trace_local_point: [0.0, 0.0, 0.18]
torso_trace_stride: 10
torso_trace_max_points: 300
follow_camera_enable: true
follow_camera_distance: 3.2
follow_camera_azimuth_deg: 145.0
follow_camera_elevation_deg: -20.0
follow_camera_lookat_local_offset: [-0.35, -0.20, 0.20]
task_trace_enable: true
task_trace_path: ""
task_trace_height: 0.05
task_trace_stride: 10
task_trace_max_points: 300
root_pos_init: [0.0, 0.0, 0.8]
root_quat_init: [1.0, 0.0, 0.0, 0.0]

ang_vel_scale: 1.0
dof_pos_scale: 1.0
dof_vel_scale: 1.0
action_scale: 0.25
cmd_scale: [1.0, 1.0, 1.0]
cmd_init: [0.5, 0.0, 0.0]
random_commands: false
command_mode: independent
command_ramp: false
command_smoothing_tau: 0.25
command_max_linear_accel: 1.2
command_max_yaw_accel: 1.5
command_seed: 1
command_interval: 2.0
command_ranges:
  lin_vel_x: [-0.2, 1.0]
  lin_vel_y: [-0.25, 0.25]
  yaw_rate: [-0.6, 0.6]
joystick_device: /dev/input/js0
joystick_axis_lin_x: 1
joystick_axis_lin_y: 0
joystick_axis_yaw: 3
joystick_sign_lin_x: -1.0
joystick_sign_lin_y: 1.0
joystick_sign_yaw: 1.0
joystick_axis_max: 32768.0
joystick_deadzone: 0.05
joystick_ranges:
